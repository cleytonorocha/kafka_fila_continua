# ──────────────────────────────────────────────────────────────
# Default profile: local development with H2 + Kafka on localhost
# ──────────────────────────────────────────────────────────────

spring:
  application:
    name: kafka-workers

  # ── H2 in-memory database (single-instance local dev) ──
  datasource:
    url: jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  # ── Kafka ──
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: workers
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Manual offset commit — offsets are committed AFTER processing
      enable-auto-commit: false
    listener:
      # Commit offset after each record is processed (at-least-once delivery)
      ack-mode: record
      # Number of consumer threads PER instance.
      # With 6 partitions and concurrency=3, each thread handles 2 partitions.
      # With 2 instances (concurrency=3 each), 6 consumers = 1 partition each.
      concurrency: 3

server:
  port: 8080

# ── Application-specific ──
app:
  instance-id: ${HOSTNAME:local-dev}

logging:
  level:
    com.example.kafkaworkers: INFO
    org.apache.kafka: WARN
    org.springframework.kafka: INFO
